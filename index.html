<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Impostor Game</title>
<style>
body { 
    font-family: sans-serif; 
    background: #222; 
    color: white; 
    text-align: center; 
    padding-bottom: 60px; /* 🔥 para que no tape contenido */
}

.container { max-width: 500px; margin: 50px auto; background: #333; padding: 20px; border-radius: 15px; }

.character { width: 80px; height: 80px; cursor: pointer; border-radius: 50%; border: 3px solid transparent; object-fit: cover; margin: 5px; }

.selected { border-color: gold; transform: scale(1.1); }

.lobby-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid gold; margin: 10px auto; object-fit: cover; }

button { padding: 10px 20px; cursor: pointer; background: gold; border: none; font-weight: bold; border-radius: 5px; margin: 5px; }

#wordDisplay { font-size: 1.5rem; margin: 20px; padding: 20px; border: 2px dashed gold; display: none; background: #444; }

#usersList { background: #444; padding: 10px; border-radius: 10px; margin-top: 10px; }

/* 🔥 FOOTER */
#footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: #aaa;
    text-align: center;
    padding: 10px;
    font-size: 0.9rem;
    border-top: 1px solid #444;
}
</style>
</head>
<body>

<div id="app" class="container"></div>

<!-- 🔥 FOOTER -->
<footer id="footer">
    © <span id="year"></span> Impostor Game - Todos los derechos reservados
</footer>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
document.getElementById("year").textContent = new Date().getFullYear();

const app = document.getElementById("app");
let username = localStorage.getItem("username");

const characterGifs = {
    "Peron": "https://i.giphy.com/KbAj5yM9zzZRvX0YBn.webp",
    "Milei": "https://media.tenor.com/Wcpxt4b9aLUAAAAM/milei-javier-milei.gif",
    "kicillof": "https://media.tenor.com/UH-OX_1X8ZwAAAAM/axel-axel-kicillof.gif",
    "Cristina": "https://media.tenor.com/bU60bEqgnSIAAAAM/cfk-cristina.gif",
    "Alex": "https://media.tenor.com/0g_y8KH3KBAAAAAM/hijole-alex-caniggia.gif",
    "Andy": "https://media.sitioandino.com.ar/p/2aef65111593b42217758da02dbe2c2a/adjuntos/335/imagenes/000/820/0000820439/790x0/smart/andy-chango-masterchef-celebrity.jpg",
    "Andre": "https://media.tenor.com/59qzl7WuRBEAAAAM/andreadelboca-andrea-del-boca.gif",
    "Macri": "https://media.tenor.com/KEbPrrnmqMsAAAAM/por-dio-sign-of-the-cross.gif",
    "Evita": "https://mir-s3-cdn-cf.behance.net/project_modules/hd/aa5b7381451879.5d0011880c9cd.gif"
};

if (!username) renderLogin();
else renderLobby();

function renderLogin() {
    app.innerHTML = `
        <h1>Elige tu Personaje</h1>
        <div id="chars">
            ${Object.keys(characterGifs).map(name => `<img src="${characterGifs[name]}" class="character" data-name="${name}">`).join('')}
        </div>
        <br>
        <input type="text" id="userInput" placeholder="Tu nombre...">
        <button onclick="login()">Entrar</button>
        <br><br>
        <label>
            <input type="checkbox" id="hintCheckbox">
            Usar Pista
        </label>
    `;

    let selected = "";
    document.querySelectorAll('.character').forEach(img => {
        img.onclick = () => {
            document.querySelectorAll('.character').forEach(i => i.classList.remove('selected'));
            img.classList.add('selected');
            selected = img.dataset.name;
        };
    });

    window.login = async () => {
        const user = document.getElementById("userInput").value;
        if (!user || !selected) return alert("Completa todo");

        const useHint = document.getElementById("hintCheckbox").checked;
        localStorage.setItem("useHint", useHint);

        const res = await fetch("/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ username: user, character: selected })
        });

        const data = await res.json();
        if (data.success) {
            localStorage.setItem("username", user);
            localStorage.setItem("userCharacter", selected);
            location.reload();
        } else alert(data.message);
    };
}

function renderLobby() {
    const socket = io();

    const charName = localStorage.getItem("userCharacter");
    const charGif = characterGifs[charName] || "";

    app.innerHTML = `
        <img src="${charGif}" class="lobby-avatar">
        <h1>Hola ${username}</h1>
        <div id="usersList">Esperando jugadores...</div>
        <button id="startBtn">INICIAR JUEGO</button>
        <div id="wordDisplay"></div>
        <button id="logoutBtn">Cerrar Sesión</button>
    `;

    const savedRole = localStorage.getItem("roleData");
    if (savedRole) {
        const data = JSON.parse(savedRole);
        const display = document.getElementById("wordDisplay");
        display.style.display = "block";

        if (data.role === "impostor") {
            display.innerHTML = `
                <h2 style='color:red'>ERES EL IMPOSTOR</h2>
                ${data.hint ? `<p>Pista: ${data.hint}</p>` : ""}
            `;
        } else {
            display.innerHTML = `
                <h2>Tu palabra:</h2>
                <p style='font-size:2rem;color:gold'>${data.word}</p>
            `;
        }
    }

    document.getElementById("logoutBtn").onclick = () => {
        socket.emit("logout");
        localStorage.clear();
        location.reload();
    };

    socket.emit("register-user", {
        username,
        character: localStorage.getItem("userCharacter")
    });

    socket.on("users-list", users => {
        document.getElementById("usersList").innerHTML =
            users.length > 0
                ? "<strong>Jugadores:</strong><br>" + users.map(u => u.username).join("<br>")
                : "Esperando jugadores...";
    });

    document.getElementById("startBtn").onclick = () => {
        const useHint = localStorage.getItem("useHint") === "true";
        socket.emit("start-game", { useHint });
    };

    socket.on("receive-role", data => {
        const display = document.getElementById("wordDisplay");
        display.style.display = "block";

        localStorage.setItem("roleData", JSON.stringify(data));

        if (data.role === "impostor") {
            display.innerHTML = `
                <h2 style='color:red'>ERES EL IMPOSTOR</h2>
                ${data.hint ? `<p>Pista: ${data.hint}</p>` : ""}
            `;
        } else {
            display.innerHTML = `
                <h2>Tu palabra:</h2>
                <p style='font-size:2rem;color:gold'>${data.word}</p>
            `;
        }
    });

    socket.on("error-msg", msg => alert(msg));
}
</script>

</body>
</html>
